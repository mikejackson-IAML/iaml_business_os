name: YouTube Channel Monitor

on:
  schedule:
    # Run every 6 hours to catch new videos promptly
    # 6 AM, 12 PM, 6 PM, 12 AM UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force_synopsis:
        description: 'Force regenerate synopses for all videos'
        required: false
        default: 'false'
      notify:
        description: 'Send notification even if no new videos'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  monitor-youtube:
    name: Check for New Videos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube videos
        id: fetch
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/fetch-youtube-videos.js 2>&1 | tee youtube-output.log

          # Extract new video count from metadata
          if [ -f data/youtube/metadata.json ]; then
            NEW_COUNT=$(cat data/youtube/metadata.json | grep -o '"newVideosCount": [0-9]*' | cut -d: -f2 | tr -d ' ')
            echo "new_videos=${NEW_COUNT:-0}" >> $GITHUB_OUTPUT
          else
            echo "new_videos=0" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes
        run: |
          git add data/youtube/
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ steps.fetch.outputs.new_videos }}" -gt "0" ]; then
            git commit -m "feat: new video detected from Nate B Jones $(date +%Y-%m-%d)"
          else
            git commit -m "chore: update youtube cache $(date +%Y-%m-%d)"
          fi

          git push

      - name: Generate Summary
        run: |
          echo "## 📺 YouTube Channel Monitor" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Monitored Channel:** Nate B Jones" >> $GITHUB_STEP_SUMMARY
          echo "**Check Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f data/youtube/metadata.json ]; then
            CHANNEL=$(cat data/youtube/metadata.json | grep -o '"name": "[^"]*"' | head -1 | cut -d'"' -f4)
            TOTAL=$(cat data/youtube/metadata.json | grep -o '"totalVideosCached": [0-9]*' | cut -d: -f2 | tr -d ' ')
            NEW=$(cat data/youtube/metadata.json | grep -o '"newVideosCount": [0-9]*' | cut -d: -f2 | tr -d ' ')

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Channel | $CHANNEL |" >> $GITHUB_STEP_SUMMARY
            echo "| Videos Cached | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| New Videos | $NEW |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$NEW" -gt "0" ]; then
              echo "### 🎉 New Videos Detected!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ -f data/youtube/new-videos.json ]; then
                # List new video titles
                echo "| Video | Published |" >> $GITHUB_STEP_SUMMARY
                echo "|-------|-----------|" >> $GITHUB_STEP_SUMMARY
                cat data/youtube/new-videos.json | grep -o '"title": "[^"]*"' | cut -d'"' -f4 | while read title; do
                  echo "| $title | Recent |" >> $GITHUB_STEP_SUMMARY
                done
              fi
            else
              echo "ℹ️ No new videos since last check" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No metadata file found - this may be the first run" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "✅ Cache updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to commit" >> $GITHUB_STEP_SUMMARY
          fi

      # Optional: Send notification for new videos
      # Uncomment and configure if you want Slack/Discord/Email notifications
      #
      # - name: Send Slack notification
      #   if: steps.fetch.outputs.new_videos > 0
      #   uses: slackapi/slack-github-action@v1.24.0
      #   with:
      #     payload: |
      #       {
      #         "text": "🎬 New video from Nate B Jones!",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "📺 *New YouTube Video Alert*\n${{ steps.fetch.outputs.new_videos }} new video(s) detected"
      #             }
      #           }
      #         ]
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
