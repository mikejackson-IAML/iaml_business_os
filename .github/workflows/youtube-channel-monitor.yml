name: YouTube Channel Monitor

on:
  schedule:
    # Run every 6 hours to catch new videos promptly
    # 6 AM, 12 PM, 6 PM, 12 AM UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force_synopsis:
        description: 'Force regenerate synopses for all videos'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  monitor-youtube:
    name: Monitor AI YouTube Channels
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube videos from all channels
        id: fetch
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Channel IDs (auto-discovered if not set)
          YOUTUBE_CHANNEL_NATE: ${{ secrets.YOUTUBE_CHANNEL_NATE }}
          YOUTUBE_CHANNEL_AIEXPLAINED: ${{ secrets.YOUTUBE_CHANNEL_AIEXPLAINED }}
          YOUTUBE_CHANNEL_MATTWOLFE: ${{ secrets.YOUTUBE_CHANNEL_MATTWOLFE }}
          YOUTUBE_CHANNEL_WESROTH: ${{ secrets.YOUTUBE_CHANNEL_WESROTH }}
          YOUTUBE_CHANNEL_TWOMINUTEPAPERS: ${{ secrets.YOUTUBE_CHANNEL_TWOMINUTEPAPERS }}
        run: |
          node scripts/fetch-youtube-videos.js 2>&1 | tee youtube-output.log

          # Extract counts from metadata
          if [ -f data/youtube/metadata.json ]; then
            NEW_COUNT=$(cat data/youtube/metadata.json | grep -o '"newVideosCount": [0-9]*' | cut -d: -f2 | tr -d ' ')
            PENDING=$(cat data/youtube/metadata.json | grep -o '"pendingReviewCount": [0-9]*' | cut -d: -f2 | tr -d ' ')
            echo "new_videos=${NEW_COUNT:-0}" >> $GITHUB_OUTPUT
            echo "pending=${PENDING:-0}" >> $GITHUB_OUTPUT
          else
            echo "new_videos=0" >> $GITHUB_OUTPUT
            echo "pending=0" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes
        run: |
          git add data/youtube/
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ steps.fetch.outputs.new_videos }}" -gt "0" ]; then
            git commit -m "feat: ${{ steps.fetch.outputs.new_videos }} new AI video(s) detected $(date +%Y-%m-%d)"
          else
            git commit -m "chore: update youtube cache $(date +%Y-%m-%d)"
          fi

          git push

      - name: Generate Summary
        run: |
          echo "## 📺 AI YouTube Channel Monitor" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Check Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f data/youtube/metadata.json ]; then
            TOTAL=$(cat data/youtube/metadata.json | grep -o '"totalVideosCached": [0-9]*' | cut -d: -f2 | tr -d ' ')
            NEW=$(cat data/youtube/metadata.json | grep -o '"newVideosCount": [0-9]*' | cut -d: -f2 | tr -d ' ')
            PENDING=$(cat data/youtube/metadata.json | grep -o '"pendingReviewCount": [0-9]*' | cut -d: -f2 | tr -d ' ')

            echo "### Channels Monitored" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Channel | Focus |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Nate B Jones | AI Business, Productivity |" >> $GITHUB_STEP_SUMMARY
            echo "| AI Explained | AI News, Analysis |" >> $GITHUB_STEP_SUMMARY
            echo "| Matt Wolfe | AI Tools, Tutorials |" >> $GITHUB_STEP_SUMMARY
            echo "| Wes Roth | Breaking News, Commentary |" >> $GITHUB_STEP_SUMMARY
            echo "| Two Minute Papers | Research, Breakthroughs |" >> $GITHUB_STEP_SUMMARY
            echo "| + 11 more | Various AI topics |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Videos Cached | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| New This Check | $NEW |" >> $GITHUB_STEP_SUMMARY
            echo "| Pending Review | $PENDING |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$NEW" -gt "0" ]; then
              echo "### 🎉 New Videos Detected!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Run \`/ai-brief\` or check \`website/data/youtube/pending-review.json\` to review." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ -f data/youtube/pending-review.json ]; then
                echo "**Recent additions:**" >> $GITHUB_STEP_SUMMARY
                cat data/youtube/pending-review.json | grep -o '"title": "[^"]*"' | head -5 | cut -d'"' -f4 | while read title; do
                  echo "- $title" >> $GITHUB_STEP_SUMMARY
                done
              fi
            else
              echo "ℹ️ No new videos since last check" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ First run - building initial cache" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "✅ Cache updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to commit" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Two-tier synopsis system: Quick synopses auto-generated, full synopses on-demand*" >> $GITHUB_STEP_SUMMARY
