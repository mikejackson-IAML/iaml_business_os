fixes_applied:
  - issue: "Workflow used n8n-nodes-base.postgres nodes with direct SQL queries"
    error: "Node does not have any credentials set / Connection refused"
    fix: "Replaced Postgres nodes with single HTTP Request node calling Supabase REST API RPC function"
    details: "Direct Postgres connections are broken on this n8n instance. Created get_backlink_quality_data() SECURITY DEFINER RPC function in web_intel schema."
  - issue: "Supabase REST API permission denied on direct table reads"
    error: "permission denied for table backlink_profile"
    fix: "Created SECURITY DEFINER RPC function that aggregates data from backlink_profile and backlinks tables"
    details: "Anon key lacks SELECT on web_intel tables. RPC with SECURITY DEFINER bypasses this."
  - issue: "No error handling in original workflow"
    fix: "Added standard error handling chain: Error Trigger -> Parse Error Details -> Log Error to DB -> Send Error to Slack"
  - issue: "Non-existent backlink_summary view referenced"
    fix: "Replaced with backlink_profile table (which exists) accessed via new RPC function"
  - issue: "Missing business-os tag"
    fix: "Added business-os tag to workflow"

structural_compliance:
