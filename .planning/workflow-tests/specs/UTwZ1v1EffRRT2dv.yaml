scenarios:
  - name: happy_path_ranking_changes
    description: "Send valid ranking alert data with critical, warning, and info changes"
    payload:
      categorized:
        critical:
          - keyword: "employment law training"
            yesterday_position: 5
            today_position: 15
            position_change: 10
            change_type: ranking_drop
        warning:
          - keyword: "hr compliance course"
            yesterday_position: 8
            today_position: 12
            position_change: 4
            change_type: ranking_drop
        info:
          - keyword: "labor law seminar"
            yesterday_position: 20
            today_position: 10
            position_change: -10
            change_type: ranking_gain
      counts:
        total: 3
        critical: 1
        warning: 1
        info: 1
    expected_branch: "Should Send?->true"
    expected_response:
      success: true
      counts:
        total: 3
    execution_id: "195796"
    result: success

  - name: skip_path_no_changes
    description: "Send null data to trigger skip path"
    payload:
      categorized: null
      counts: null
    expected_branch: "Should Send?->false"
    expected_response:
      success: true
      skipped: true
      reason: "No ranking changes"
    execution_id: "195798"
    result: success

  - name: edge_case_null_keyword
    description: "Send data with null keyword to test resilience"
    payload:
      categorized:
        critical:
          - keyword: null
      counts:
        total: 1
        critical: 1
        warning: 0
        info: 0
    expected_branch: "Should Send?->true"
    execution_id: "195800"
    result: success

