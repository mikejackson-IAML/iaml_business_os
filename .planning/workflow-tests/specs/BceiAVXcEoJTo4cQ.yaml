notes: |
  Workflow fetches seed keywords from Supabase, queries DataForSEO for related keywords,
  filters out existing keywords, scores new suggestions, and inserts new ones if found.

  True branch coverage requires DataForSEO to return keywords not already in the keyword
  tracking table. As the database grows with more tracked keywords, the filter becomes more
  restrictive and the true branch fires less often.

  Error handling chain is a standard pattern (Error Trigger -> Parse -> Slack notification).
  It can only be tested by inducing a workflow-level error.

  The schedule trigger (Weekly Wednesday 4am CT) is covered implicitly since the webhook
  trigger follows the exact same path through all subsequent nodes.

