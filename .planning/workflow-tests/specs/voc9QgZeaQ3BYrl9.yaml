notes: |
  Built from scratch to replace phantom workflow 9EBf7fQpSHouh5w8 which used
  a non-existent GSC Mobile Usability API endpoint. This workflow uses the free
  PageSpeed Insights (Lighthouse) API instead.

  PageSpeed API daily quota was exceeded during testing. The workflow correctly
  handled the API errors (429 responses) by recording zero scores and flagging
  all pages as having issues. This actually validated the error-handling path
  in the main flow.

  The false branch was tested using a temporary TEST_MODE flag in the Extract
  Mobile Metrics node to simulate high scores (95/100), then the production
  code was restored.

  Architecture: Linear flow without SplitInBatches. The HTTP Request node's
  built-in batching (batchSize=1, interval=3000ms) handles rate limiting.
  All 4 pages flow through as items, getting processed sequentially.
