infrastructure_fixes:
  - type: view_creation
    description: >
      Created missing web_intel.striking_distance view that the
      get_striking_distance_opportunities RPC depends on. The view was
      defined in migrations_archive but not present in the live database.
    sql: >
      CREATE OR REPLACE VIEW web_intel.striking_distance AS
      SELECT tk.id as keyword_id, tk.keyword, tk.search_volume, tk.priority,
        tk.target_url, dr.position, dr.ranking_url,
        CASE WHEN dr.position BETWEEN 4 AND 10 THEN 'page_1_opportunity'
             WHEN dr.position BETWEEN 11 AND 20 THEN 'page_2_opportunity'
        END as opportunity_type,
        COALESCE(tk.search_volume, 100) * (21 - dr.position) as opportunity_score
      FROM web_intel.tracked_keywords tk
      JOIN web_intel.daily_rankings dr ON tk.id = dr.keyword_id
        AND dr.collected_date = CURRENT_DATE
      WHERE tk.status = 'active' AND dr.position BETWEEN 4 AND 20
      ORDER BY opportunity_score DESC

design_notes:
  - issue: "IF condition checks n8n item count instead of response array length"
    detail: >
      The IF node uses $input.all().length > 0 which counts n8n items,
      not the data array length. Combined with alwaysOutputData:true,
      the false branch is unreachable. To fix, the condition should
      check the actual response data, e.g. $json.length or similar.
    severity: low
    impact: "When no opportunities exist, a Slack message is still sent with 0 counts"
