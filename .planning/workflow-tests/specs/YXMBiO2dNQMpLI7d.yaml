# Workflow Overview
trigger: schedule (Weekly Monday 6am CT - cron 0 6 * * 1)
purpose: >
  Finds link building opportunities by analyzing competitor backlinks.
  Fetches active competitors from Supabase, analyzes their backlink profiles,
  identifies sites linking to competitors but not to IAML, and stores high-value
  opportunities. Notifies Slack when opportunities are found.

# Node Inventory (11 nodes)
nodes:
  - id: schedule-trigger
    name: "Weekly Monday 6am CT"
    type: scheduleTrigger
    covered: true
  - id: fetch-competitors
    name: "Fetch Top Competitors"
    type: httpRequest
    covered: true
    notes: "Calls web_intel.get_active_competitors() RPC via Supabase REST API"
  - id: analyze-backlinks
    name: "Analyze Competitor Backlinks"
    type: code
    covered: true
    notes: "Processes competitors and generates link opportunities. DataForSEO API integration pending credential configuration."
  - id: check-opps
    name: "Has Opportunities?"
    type: if
    covered: true
    branch_point: true
  - id: store-opportunities
    name: "Store Opportunities"
    type: httpRequest
    covered: true
    notes: "Calls web_intel.upsert_link_opportunities() RPC via Supabase REST API"
  - id: notify-slack
    name: "Notify Slack"
    type: httpRequest
    covered: true
    notes: "Posts to Web Intel Slack channel with opportunity summary"
  - id: noop
    name: "No Opportunities"
    type: noOp
    covered: true
  - id: error-trigger
    name: "Error Trigger"
    type: errorTrigger
    covered: false
    notes: "Standard canary error chain - verified in other workflow tests"
  - id: parse-error
    name: "Parse Error Details"
    type: code
    covered: false
    notes: "Standard canary pattern"
  - id: log-error-db
    name: "Log Error to DB"
    type: httpRequest
    covered: false
    notes: "Standard canary pattern - logs to n8n_brain.workflow_errors"
  - id: send-error-slack
    name: "Send Error to Slack"
    type: httpRequest
    covered: false
    notes: "Standard canary pattern - posts to error Slack channel"

