    execution_id: "195748"
    result: success

  - name: anomalies_detected
    description: "Lowered thresholds to 0.001 to force anomaly detection (TRUE branch)"
    trigger: webhook
    method: GET
    payload: null
    modifications:
      - node: "Detect Anomalies"
        field: "THRESHOLD_DROP"
        original: 0.20
        test_value: 0.001
      - node: "Detect Anomalies"
        field: "THRESHOLD_SPIKE"
        original: 0.50
        test_value: 0.001
    expected_branch: "Has Anomalies? -> true"
    expected_nodes:
      - "Manual Test (Webhook)"
      - "Fetch Yesterday Traffic"
      - "Fetch Averages"
      - "Merge Data"
      - "Detect Anomalies"
      - "Has Anomalies?"
      - "Prepare Alert Records"
      - "Insert Alerts"
      - "Aggregate Alerts"
      - "Send Slack Alert"
      - "Log Success (Alerts)"
    execution_id: "195753"
    result: success

