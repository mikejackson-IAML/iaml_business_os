# Node Inventory (15 nodes after removing test webhook)
nodes:
  - id: schedule-trigger
    name: "Weekly Monday 7am CT"
    type: scheduleTrigger
    purpose: "Triggers weekly on Monday at 7am CT"

  - id: fetch-traffic
    name: "Fetch Weekly Traffic"
    type: httpRequest
    purpose: "Calls get_weekly_traffic_summary RPC for 7-day traffic data"

  - id: fetch-rankings
    name: "Fetch Ranking Changes"
    type: httpRequest
    purpose: "Calls get_weekly_ranking_changes RPC for ranking change events"

  - id: fetch-backlinks
    name: "Fetch Backlinks"
    type: httpRequest
    purpose: "Calls get_weekly_backlink_summary RPC for backlink profile data"

  - id: fetch-alerts
    name: "Fetch Alerts"
    type: httpRequest
    purpose: "Calls get_weekly_alerts_summary RPC for alert counts"

  - id: merge-traffic-rankings
    name: "Merge Traffic + Rankings"
    type: merge
    purpose: "Appends traffic and rankings data into single stream"

  - id: merge-backlinks-alerts
    name: "Merge Backlinks + Alerts"
    type: merge
    purpose: "Appends backlinks and alerts data into single stream"

  - id: merge-all-data
    name: "Merge All Data"
    type: merge
    purpose: "Combines all 4 data streams for digest compilation"

  - id: compile-digest
    name: "Compile Digest"
    type: code
    purpose: "Assembles all metrics into formatted Slack message and store body"

  - id: send-slack
    name: "Send to Slack"
    type: httpRequest
    purpose: "Posts formatted weekly digest to Slack"

  - id: store-report
    name: "Store Report"
    type: httpRequest
    purpose: "Stores digest in web_intel.reports via store_weekly_digest RPC"

  - id: error-trigger
    name: "Error Trigger"
    type: errorTrigger
    purpose: "Catches workflow errors"

  - id: parse-error
    name: "Parse Error Details"
    type: code
    purpose: "Extracts structured error information"

  - id: log-error-db
    name: "Log Error to DB"
    type: httpRequest
    purpose: "Logs error to Supabase via log_workflow_error RPC"

  - id: send-error-slack
    name: "Send Error to Slack"
    type: httpRequest
    purpose: "Sends error notification to Slack error channel"
